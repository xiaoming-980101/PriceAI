name: Probe API Transit

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      station:
        description: "Comma-separated station ids to probe"
        required: false
        default: ""
      target_limit:
        description: "Max target models per probe profile"
        required: false
        default: "1"

concurrency:
  group: probe-api-transit
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --omit=dev

      - name: Run API transit probe
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY }}
          REQUESTED_STATION: ${{ github.event.inputs.station }}
          REQUESTED_TARGET_LIMIT: ${{ github.event.inputs.target_limit }}
        run: |
          set -euo pipefail

          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY" ]; then
            echo "缺少 NEXT_PUBLIC_SUPABASE_URL、SUPABASE_SERVICE_ROLE_KEY 或 API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY secret"
            exit 1
          fi

          node --input-type=module <<'NODE'
          import { probeApiTransitStations } from "./scripts/probe-api-transit.mjs";

          const station = process.env.REQUESTED_STATION || undefined;
          const targetLimit = Number(process.env.REQUESTED_TARGET_LIMIT || 1);
          const result = await probeApiTransitStations({
            station,
            post: true,
            dbCredentials: true,
            targetLimit,
          });

          const counts = result.counts || {};
          const probed = Number(counts.probed || 0);
          const skipped = Number(counts.skipped || 0);
          const unexpectedSkipped = Array.isArray(result.skipped)
            ? result.skipped.filter((item) => item?.reason !== "profile_disabled")
            : [];
          if (probed === 0 || unexpectedSkipped.length > 0) {
            throw new Error(`API transit probe incomplete: probed=${probed}, skipped=${skipped}, unexpectedSkipped=${unexpectedSkipped.length}`);
          }

          console.log(`API transit probe ok: probed=${probed}, skipped=${skipped}, disabled=${skipped - unexpectedSkipped.length}, success=${counts.successfulRuns || 0}, failed=${counts.failedRuns || 0}`);
          console.log(JSON.stringify({
            counts,
            skipped: result.skipped,
            rollups: result.rollups?.map((rollup) => ({
              stationId: rollup.stationId,
              station: rollup.station,
              lastCheckedAt: rollup.lastCheckedAt,
            })),
          }, null, 2));
          NODE

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE
