name: Promote Cloudflare Worker Version

on:
  workflow_dispatch:
    inputs:
      version_id:
        description: "Worker Version ID to promote to 100% traffic"
        required: true
      smoke_base_url:
        description: "Production URL to smoke test after promotion"
        required: false
        default: "https://priceai.cc"

jobs:
  promote-cloudflare-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROMOTE_MESSAGE: Promote ${{ inputs.version_id }} from GitHub Actions
      CLOUDFLARE_SMOKE_BASE_URL: ${{ inputs.smoke_base_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run promote:cloudflare -- "${{ inputs.version_id }}"

      - run: npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"
