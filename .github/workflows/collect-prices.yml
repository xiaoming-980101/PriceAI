name: Collect Prices

on:
  schedule:
    # 每 30 分钟跑一次（GitHub Actions cron 用 UTC，最小粒度 5 分钟，但官方建议 ≥ 10 分钟）
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: collect-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Collect prices in runner
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "缺少 NEXT_PUBLIC_SUPABASE_URL 或 SUPABASE_SERVICE_ROLE_KEY secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const raw = process.env.COLLECT_PRICES_URL;
          const url = new URL(raw);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/collect-prices\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          npm run collect:prices -- --all --post --endpoint "$BASE_URL"
