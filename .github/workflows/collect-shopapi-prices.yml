name: Collect ShopApi Prices

on:
  schedule:
    # 与主采集任务和 dujiao 专项任务错开，只跑 shopApi 来源。
    # shopApi 会按主域分组并发；同一主域内部仍然串行。
    - cron: "5,35 * * * *"
  workflow_dispatch: {}

concurrency:
  group: collect-shopapi-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Collect shopApi prices in runner
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRICEAI_COLLECTOR_NODE_ID: github-actions-shopapi
          PRICEAI_COLLECTOR_NODE_NAME: GitHub Actions ShopApi
          PRICEAI_COLLECTOR_NODE_TYPE: ci
          PRICEAI_COLLECTOR_NODE_RUNTIME: github-actions
          PRICEAI_COLLECTOR_NODE_REGION: github-hosted
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "缺少 NEXT_PUBLIC_SUPABASE_URL 或 SUPABASE_SERVICE_ROLE_KEY secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const raw = process.env.COLLECT_PRICES_URL;
          const url = new URL(raw);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/collect-prices\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          npm run collect:prices -- --all --kind shopApi --concurrency 2 --post --endpoint "$BASE_URL" --liandong-shop-limit 10
