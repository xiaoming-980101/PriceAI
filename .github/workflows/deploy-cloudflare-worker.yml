name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: "URL to smoke test after deployment"
        required: false
        default: "https://priceai.cc"

jobs:
  deploy-cloudflare-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_SMOKE_BASE_URL: ${{ inputs.smoke_base_url }}
      NEXT_DEPLOYMENT_ID: ${{ github.sha }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      ADMIN_SESSION_VERSION: ${{ secrets.ADMIN_SESSION_VERSION }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS: ${{ vars.NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - run: npm run check:cloudflare-env

      - name: Apply Supabase migrations
        run: |
          set -euo pipefail

          PROJECT_REF=$(node <<'NODE'
          const raw = process.env.NEXT_PUBLIC_SUPABASE_URL;
          if (!raw) {
            throw new Error("Missing NEXT_PUBLIC_SUPABASE_URL");
          }
          console.log(new URL(raw).hostname.split(".")[0]);
          NODE
          )

          mkdir -p supabase/.temp
          printf '%s' "$PROJECT_REF" > supabase/.temp/project-ref

          if [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            supabase link --project-ref "$PROJECT_REF" --yes
            supabase db push --yes
          elif [ -n "$SUPABASE_DB_PASSWORD" ]; then
            DB_URL=$(PROJECT_REF="$PROJECT_REF" node <<'NODE'
            const projectRef = process.env.PROJECT_REF;
            const password = process.env.SUPABASE_DB_PASSWORD;
            const host = process.env.SUPABASE_POOLER_HOST || "aws-1-ap-southeast-1.pooler.supabase.com";
            if (!projectRef || !password) {
              throw new Error("Missing project ref or Supabase DB password");
            }
            console.log(`postgresql://postgres.${projectRef}:${encodeURIComponent(password)}@${host}:5432/postgres?sslmode=require`);
          NODE
            )
            supabase db push --yes --db-url "$DB_URL"
          else
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_DB_PASSWORD secret"
            exit 1
          fi

      - run: npm run lint

      - run: npm run build:cloudflare

      - run: npm run deploy:cloudflare

      - run: npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"
