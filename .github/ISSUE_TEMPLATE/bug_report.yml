name: Bug report
description: 报告 PriceAI 的错误或异常行为
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请列出可以稳定复现问题的步骤。
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 你原本期望看到什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际看到的结果、报错信息或截图。
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: 相关页面或来源 URL
      description: 如果和某个页面、商品、来源渠道有关，请填写链接。
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      placeholder: |
        浏览器：
        系统：
        部署环境：
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我没有在 Issue 中粘贴密钥、后台密码或其他敏感信息
          required: true
